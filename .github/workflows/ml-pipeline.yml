name: ML Pipeline with DVC and DagsHub

on:
  push:
    branches:
      - main
      - "**"   # runs on all branches (feature branches included)

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Install DVC and DagsHub
      - name: Install DVC and DagsHub
        run: |
          pip install dvc dagshub

      # Configure Git (required for DVC operations)
      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # Configure DagsHub credentials
      - name: Setup DagsHub authentication
        run: |
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

      # Pull data from DVC remote
      - name: DVC Pull
        run: dvc pull

      # Run full ML pipeline
      - name: Run DVC Pipeline
        run: dvc repro

      # Push updated artifacts back to DVC remote
      - name: DVC Push
        run: dvc push

      # Commit any pipeline-generated changes (optional)
      - name: Commit changes
        run: |
          git add .
          git commit -m "CI: update pipeline artifacts" || echo "No changes to commit"
          git push