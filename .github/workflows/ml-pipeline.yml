name: ML Pipeline with DVC, MLflow and DagsHub

on:
  push:
    branches:
      - main
      - "**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dagshub mlflow

      # 4. Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # 5. Setup DVC remote (DagsHub)
      - name: Setup DVC remote
        run: |
          dvc --version

          dvc remote add origin https://dagshub.com/saraniz/Drift-Monitoring.dvc || true

          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

      # 6. Setup MLflow + DagsHub authentication (FIX 403 ERROR)
      - name: Setup MLflow authentication
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/saraniz/Drift-Monitoring.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # 7. Cache DVC
      - name: Cache DVC
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-cache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            dvc-cache-${{ runner.os }}-

      # 8. Pull data (safe after auth fix)
      - name: DVC Pull
        run: dvc pull --force

      # 9. Run full ML pipeline (preprocess → drift → train)
      - name: Run DVC Pipeline
        run: dvc repro

      # 10. Push artifacts to DagsHub
      - name: DVC Push
        run: dvc push

      # 11. Commit pipeline updates (safe)
      - name: Commit changes
        run: |
          git add .
          git commit -m "CI: update pipeline artifacts" || echo "No changes to commit"
          git push