name: ML Pipeline with DVC and DagsHub

on:
  push:
    branches:
      - main
      - "**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dagshub

      # 4. Configure Git (required for DVC + commits)
      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # 5. Setup DVC remote + authentication (IMPORTANT FIX)
      - name: Setup DVC + DagsHub
        run: |
          # Ensure DVC is available
          dvc --version

          # Add remote (safe even if already exists)
          dvc remote add origin https://dagshub.com/saraniz/Drift-Monitoring.dvc || true

          # Configure authentication
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

      # 6. Cache DVC data (speeds up workflow)
      - name: Cache DVC
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-cache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            dvc-cache-${{ runner.os }}-

      # 7. Pull dataset + artifacts from DagsHub
      - name: DVC Pull
        run: dvc pull --force

      # 8. Run full ML pipeline
      - name: Run DVC Pipeline
        run: dvc repro

      # 9. Push updated data/models back to DagsHub
      - name: DVC Push
        run: dvc push

      # 10. Commit any generated outputs (optional)
      - name: Commit changes
        run: |
          git add .
          git commit -m "CI: update pipeline artifacts" || echo "No changes to commit"
          git push